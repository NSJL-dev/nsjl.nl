<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dartclub Standings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: Helvetica, Arial, sans-serif;
      box-sizing: border-box;
    }

    body {
      background: #232323;
      color: #fff;
    }

    .container-wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    input[type=text],
    textarea,
    input[type=email],
    input[type=password],
    input[type=tel],
    input[type=url],
    input[type=search],
    input[type=date] {
      padding: 10px;
      width: 100%;
      font-size: 14px;
      font-family: inherit;
      line-height: 24px;
      color: #fff;
      background-color: rgba(0,0,0,0.1);
      border-radius: 4px;
      border: 2px solid rgba(0,0,0,0);
      transition: all 0.2s ease;
    }

    #leaderboard {
      padding: 50px 20px;
    }

    .ladder-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      background: #5055CB;
      padding: 15px 25px;
      border-radius: 10px;
      border: 1px solid #686EF9;
      margin-bottom: 20px;
    }

    .ladder-title {
      flex: 2;
    }

    .ladder-title h1 {
      font-size: 20px;
      color: #888DFF;
      font-weight: bold;
      text-transform: uppercase;
    }

    .ladder-search {
      flex: 1;
      min-width: 220px;
    }

    .ladder-search input::placeholder {
      color: #888DFF;
    }

    .leaderboard-results {
      text-align: left;
      border-collapse: collapse;
      width: 100%;
    }

    .leaderboard-results thead th {
      padding: 20px 15px;
      color: #747474;
      font-size: 14px;
      font-weight: bold;
    }

    .leaderboard-results tbody td {
      padding: 15px;
      background: #1a1a1a;
      font-size: 16px;
      border-bottom: 5px solid #232323;
      color: #cfcfcf;
    }

    .leaderboard-results tbody td:nth-of-type(7) {
      font-weight: bold;
    }

    .leaderboard-results tbody tr:hover td {
      background: #1d1d1d;
    }

    .leaderboard-results tbody tr:first-child td {
      color: #686EF9;
    }

    @media (max-width: 768px) {
      .leaderboard-results {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }

      .ladder-nav {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="container-wrap">
    <section id="leaderboard">
      <nav class="ladder-nav">
        <div class="ladder-title">
          <h1>Standings</h1>
        </div>
        <div class="ladder-search">
          <input
            type="text"
            id="search-leaderboard"
            class="live-search-box"
            placeholder="Search Team, Player..."
          />
        </div>
      </nav>

      <table id="rankings" class="leaderboard-results">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Team</th>
            <th>Win %</th>
            <th>Games</th>
            <th>Wins</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data komt hier -->
        </tbody>
      </table>
    </section>
  </div>

  <script>
    const rankingsBody = document.querySelector("#rankings tbody");

    const rankingsData = [
      [1, "De Koster 1", "69.9", "399", "279"],
      [2, "T Centrum 1", "62.9", "399", "251"],
      [3, "Bonn 2", "59.4", "399", "237"],
      [4, "Bonn 5", "59.4", "399", "237"],
      [5, "The Saloon 5", "54.8", "420", "230"],
      [6, "Bullseye Bandieten", "52.4", "399", "209"],
      [7, "Triple Drieske", "51.1", "399", "204"],
      [8, "Saloon 3", "45.6", "399", "182"],
      [9, "Saloon 4", "43.4", "399", "173"],
      [10, "No Skill Just Luck", "36.6", "399", "146"],
      [11, "Niet Te Pijlen", "14.3", "399", "57"]
    ];

    function populateRankings(data) {
      rankingsBody.innerHTML = "";

      data.forEach((row) => {
        const tr = document.createElement("tr");

        row.forEach((cell) => {
          const td = document.createElement("td");
          td.textContent = cell;
          tr.appendChild(td);
        });

        rankingsBody.appendChild(tr);
      });
    }

    function filterRankings() {
      const searchValue = document
        .querySelector("#search-leaderboard")
        .value
        .toLowerCase();

      const rows = document.querySelectorAll("#rankings tbody tr");

      rows.forEach((row) => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(searchValue) ? "" : "none";
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      populateRankings(rankingsData);
      document
        .querySelector("#search-leaderboard")
        .addEventListener("keyup", filterRankings);
    });
  </script>
</body>
</html>
